<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLOW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .wave-bg {
      background-image:
        radial-gradient(1200px circle at 50% -20%, rgba(59,130,246,0.35), transparent 60%),
        radial-gradient(900px circle at 0% 30%, rgba(125,211,252,0.35), transparent 55%),
        radial-gradient(900px circle at 100% 30%, rgba(191,219,254,0.45), transparent 55%);
      background-size: 140% 140%;
      animation: waveMove 14s ease-in-out infinite;
    }
    @keyframes waveMove {
      0%   { background-position: 0% 0%, 0% 0%, 0% 0%; }
      50%  { background-position: 100% 20%, 80% 30%, 20% 40%; }
      100% { background-position: 0% 0%, 0% 0%, 0% 0%; }
    }
  </style>
</head>
<body class="bg-[#f3f7ff] text-slate-900">
<div class="min-h-screen wave-bg flex items-center justify-center px-4 py-12">
  <div class="mx-auto w-full max-w-2xl">

    <header class="mb-10 text-center">
      <h1 class="text-6xl font-bold tracking-tight text-slate-900" style="font-family: 'Space Grotesk', system-ui, sans-serif;">FLOW</h1>
    </header>

    <!-- Minimal prompt box -->
    <div class="rounded-2xl border border-blue-100/80 bg-white/80 p-4 shadow-[0_20px_60px_-30px_rgba(37,99,235,0.25)] backdrop-blur">
      <textarea id="ad-text-prompt" rows="3" class="w-full rounded-xl border border-blue-100 bg-white p-3 text-sm text-slate-900 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-400/40" placeholder="Describe your product or business."></textarea>

      <div class="mt-3 flex items-center gap-3">
        <button class="rounded-full border border-blue-100 bg-white px-4 py-2 text-xs font-semibold text-blue-700 shadow-sm transition hover:bg-blue-50" id="upload-btn">Upload song</button>
        <div class="flex-1">
          <input type="range" id="length-slider" min="0" max="60" step="1" value="15" class="w-full h-1 appearance-none rounded-full bg-blue-100 accent-blue-400" />
        </div>
        <div class="text-[11px] font-medium text-slate-400">max <span id="length-value">15</span>s</div>
      </div>

      <div class="mt-2 text-xs font-semibold text-emerald-600" id="song-info"></div>
    </div>

    <button class="mt-4 w-full rounded-2xl bg-gradient-to-r from-[#2563eb] via-[#38bdf8] to-[#60a5fa] py-3 text-base font-bold text-white shadow-[0_20px_50px_-20px_rgba(37,99,235,0.4)] transition hover:brightness-110 active:translate-y-[2px]" id="run-btn">Generate</button>

    <!-- Status -->
    <div class="mt-5 hidden rounded-2xl border border-blue-100/80 bg-white/80 p-5 shadow-[0_20px_60px_-30px_rgba(37,99,235,0.25)] backdrop-blur" id="status-card">
      <div class="mb-3 text-xs font-bold uppercase tracking-[0.2em] text-slate-400">Status</div>
      <div class="flex items-center gap-3">
        <div id="spinner" class="h-5 w-5 animate-spin rounded-full border-2 border-blue-200 border-t-blue-500"></div>
        <span id="status-msg" class="text-xs text-slate-500">—</span>
      </div>
      <div class="mt-3 hidden text-xs font-semibold text-rose-500" id="error-msg"></div>
      <a class="mt-4 hidden w-full rounded-full bg-white/90 px-4 py-2 text-center text-sm font-semibold text-blue-700 shadow-md ring-1 ring-blue-100 transition hover:bg-white" id="download-btn" download>Download result</a>
    </div>

    <input type="file" id="song-file" accept="audio/*" class="hidden" />
  </div>

<script>
  // ── File upload helpers ──────────────────────────────────────────────────

  function setupDrop(inputId, infoId, uploadPath, triggerId) {
    const input = document.getElementById(inputId);
    const info  = document.getElementById(infoId);
    const trigger = document.getElementById(triggerId);
    let fileId  = null;

    trigger.addEventListener('click', () => input.click());
    input.addEventListener('change', () => { if (input.files[0]) handleFile(input.files[0]); });

    async function handleFile(file) {
      info.textContent = `Uploading "${file.name}"…`;
      const fd = new FormData();
      fd.append('file', file);
      try {
        const r = await fetch(uploadPath, { method: 'POST', body: fd });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        fileId = data.file_id;
        const dur = data.duration_seconds ? ` · ${data.duration_seconds.toFixed(1)}s` : '';
        info.textContent = `✓ ${data.filename}${dur}`;
      } catch (e) {
        info.style.color = '#f43f5e';
        info.textContent = `Upload failed: ${e.message}`;
      }
    }

    return { getFileId: () => fileId };
  }

  const song = setupDrop('song-file', 'song-info', '/upload/song', 'upload-btn');

  const lengthSlider = document.getElementById('length-slider');
  const lengthValue = document.getElementById('length-value');
  lengthValue.textContent = lengthSlider.value;
  lengthSlider.addEventListener('input', () => {
    lengthValue.textContent = lengthSlider.value;
  });

  // ── Submit ───────────────────────────────────────────────────────────────

  const runBtn     = document.getElementById('run-btn');
  const statusCard = document.getElementById('status-card');
  const statusMsg  = document.getElementById('status-msg');
  const spinner = document.getElementById('spinner');
  const errorMsg   = document.getElementById('error-msg');
  const downloadBtn = document.getElementById('download-btn');

  const thinkingVerbs = [
    'Thinking…',
    'Lollygagging…',
    'Ruminating…',
    'Contemplating…',
    'Analyzing…',
    'Processing…',
    'Tinkering…',
    'Mastering…',
    'Discombobulating…',
    'Canoodling…',
    'Julienne-ing…',
    'Propagating…',
    'Scheming…',
    'Booping…',
    'Zesting…',
    'Deliberating most earnestly…',
    'Perusing the particulars…',
    'Giving the matter due consideration…',
  ];
  let verbIndex = 0;
  function nextVerb() {
    const verb = thinkingVerbs[verbIndex % thinkingVerbs.length];
    verbIndex += 1;
    return verb;
  }

  let pollInterval = null;
  let verbInterval = null;

  runBtn.addEventListener('click', async () => {
    const adMode = 'text_prompt';
    const seamless = true;

    // Validate required inputs
    if (!song.getFileId()) {
      alert('Please upload a source song first.'); return;
    }
    const adPromptText = document.getElementById('ad-text-prompt').value.trim();
    if (!adPromptText) {
      alert('Please enter an ad text prompt.'); return;
    }

    const payload = {
      song_id: song.getFileId(),
      ad_mode: adMode,
      insert_at_seconds: 30,
      seamless_integration: seamless,
      replace_window_seconds: parseFloat(lengthSlider.value),
      ad_length_seconds: parseFloat(lengthSlider.value),
    };

    payload.ad_text_prompt = adPromptText;


    // UI state
    runBtn.disabled = true;
    statusCard.classList.remove('hidden');
    errorMsg.classList.add('hidden');
    downloadBtn.classList.add('hidden');
    spinner.classList.remove('hidden');
    statusMsg.textContent = nextVerb();
    if (verbInterval) clearInterval(verbInterval);
    verbInterval = setInterval(() => {
      statusMsg.textContent = nextVerb();
    }, 2500);

    try {
      const r = await fetch('/inject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || JSON.stringify(err));
      }
      const { job_id } = await r.json();

      // Poll
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(async () => {
        try {
          const jr = await fetch(`/jobs/${job_id}`);
          const job = await jr.json();
          statusMsg.textContent = job.status === 'processing' ? nextVerb() : job.status;

          if (job.status === 'complete') {
            clearInterval(pollInterval);
            if (verbInterval) clearInterval(verbInterval);
            spinner.classList.add('hidden');
            downloadBtn.classList.remove('hidden');
            downloadBtn.href = `/download/${job.output_filename}`;
            downloadBtn.textContent = `Download result${job.duration_seconds ? ' (' + job.duration_seconds.toFixed(1) + 's)' : ''}`;
            runBtn.disabled = false;
          } else if (job.status === 'failed') {
            clearInterval(pollInterval);
            if (verbInterval) clearInterval(verbInterval);
            spinner.classList.add('hidden');
            errorMsg.textContent = `Error: ${job.error || 'Unknown error'}`;
            errorMsg.classList.remove('hidden');
            runBtn.disabled = false;
          }
        } catch (e) {
          statusMsg.textContent = `Poll error: ${e.message}`;
        }
      }, 3000);

    } catch (e) {
      if (verbInterval) clearInterval(verbInterval);
      spinner.classList.add('hidden');
      statusMsg.textContent = 'Failed to start job';
      errorMsg.textContent = e.message;
      errorMsg.classList.remove('hidden');
      runBtn.disabled = false;
    }
  });
</script>
</body>
</html>
